<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault Messenger | Ultimate Privacy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #22d3ee; --bg: #020617; }
        body {
            background: radial-gradient(circle at top right, #083344, #020617, #000000);
            font-family: 'Outfit', sans-serif;
            color: #f1f5f9;
            transition: filter 0.3s ease;
        }
        .app-name {
            background: linear-gradient(to bottom, #ffffff 30%, #22d3ee 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(34, 211, 238, 0.3));
            letter-spacing: -0.05em;
        }
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }
        .neo-input {
            background: rgba(2, 6, 23, 0.8);
            border: 1px solid #1e293b;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .neo-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.1);
        }
        .privacy-blur { filter: blur(20px); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div id="mainApp" class="w-full max-w-lg glass rounded-[3rem] p-8 md:p-12 relative overflow-hidden transition-all duration-500">
        
        <div class="absolute -top-20 -left-20 w-64 h-64 bg-cyan-500/10 rounded-full blur-[100px]"></div>

        <div class="flex flex-col items-center mb-10">
            <div class="w-20 h-20 bg-gradient-to-br from-cyan-400 to-blue-600 p-[1px] rounded-3xl mb-6 shadow-2xl shadow-cyan-500/20">
                <div class="w-full h-full bg-[#020617] rounded-[23px] flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
            </div>
            <h1 class="app-name text-5xl font-black mb-1">VAULT MESSENGER</h1>
            <p class="text-[9px] tracking-[0.5em] text-slate-500 font-bold uppercase">Universal Privacy Protocol</p>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-8">
            <div class="bg-slate-950/50 p-3 rounded-2xl border border-slate-800 text-center">
                <label class="text-[8px] font-black text-cyan-500 uppercase block mb-1">Shift</label>
                <input type="number" id="shift" value="12" class="bg-transparent w-full text-center font-bold text-lg outline-none">
            </div>
            <button onclick="toggleSet('ghost')" id="ghostBtn" class="bg-slate-950/50 p-3 rounded-2xl border border-slate-800 transition-all hover:border-slate-600">
                <label class="text-[8px] font-bold text-slate-500 uppercase block mb-1">Ghost</label>
                <span id="ghostStat" class="text-[10px] font-black text-slate-400">OFF</span>
            </button>
            <button onclick="toggleSet('stealth')" id="stealthBtn" class="bg-slate-950/50 p-3 rounded-2xl border border-slate-800 transition-all hover:border-slate-600">
                <label class="text-[8px] font-bold text-slate-500 uppercase block mb-1">Stealth</label>
                <span id="stealthStat" class="text-[10px] font-black text-slate-400">OFF</span>
            </button>
        </div>

        <div class="relative group mb-6">
            <textarea id="msgInput" placeholder="আপনার বার্তাটি লিখুন... (Type Here)" 
                      class="w-full neo-input rounded-[2rem] p-6 h-40 text-slate-200 outline-none text-lg resize-none"></textarea>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <button onclick="run('enc')" class="bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-black py-5 rounded-2xl shadow-lg shadow-cyan-500/20 transition-all transform active:scale-95">
                ENCRYPT
            </button>
            <button onclick="run('dec')" class="bg-slate-800 hover:bg-slate-700 text-white font-black py-5 rounded-2xl border border-slate-700 transition-all active:scale-95">
                DECRYPT
            </button>
        </div>

        <div id="resArea" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
            <div class="bg-cyan-500/5 border border-cyan-500/10 rounded-[2rem] p-6 relative">
                <div class="flex justify-between items-center mb-4">
                    <span id="resLabel" class="text-[10px] font-bold text-cyan-400 tracking-widest uppercase">Output</span>
                    <button onclick="copyIt()" class="text-[10px] bg-white text-black px-4 py-1.5 rounded-full font-black hover:bg-cyan-400 transition-all">COPY</button>
                </div>
                <p id="resText" class="text-xl font-medium text-white break-words leading-relaxed"></p>
                <div class="mt-6 h-[2px] bg-slate-800 rounded-full overflow-hidden">
                    <div id="timer" class="h-full bg-cyan-400 w-full transition-all ease-linear"></div>
                </div>
            </div>
        </div>

        <footer class="mt-12 pt-8 border-t border-slate-900 flex flex-col items-center">
            <p class="text-[10px] text-slate-600 font-bold uppercase tracking-widest mb-1">Developer Contact</p>
            <a href="mailto:manis.programmer@gmail.com" class="text-cyan-500 font-bold hover:text-white transition-all">manis.programmer@gmail.com</a>
            <p class="text-[8px] text-slate-700 mt-6 font-black uppercase tracking-[0.5em]">Bangladesh • Solana Agent Kit • 2026</p>
        </footer>
    </div>

    <script>
        let settings = { ghost: false, stealth: false };
        let countdown;

        function toggleSet(type) {
            settings[type] = !settings[type];
            const btn = document.getElementById(type + 'Btn');
            const stat = document.getElementById(type + 'Stat');
            const input = document.getElementById('msgInput');
            
            if (settings[type]) {
                btn.classList.add('border-cyan-500/50', 'bg-cyan-500/5');
                stat.innerText = "ACTIVE";
                stat.className = "text-[10px] font-black text-cyan-400";
                if(type === 'stealth') input.style.webkitTextSecurity = "disc";
            } else {
                btn.classList.remove('border-cyan-500/50', 'bg-cyan-500/5');
                stat.innerText = "OFF";
                stat.className = "text-[10px] font-black text-slate-400";
                if(type === 'stealth') input.style.webkitTextSecurity = "none";
            }
        }

        // Multi-Language Unicode Engine
        function run(mode) {
            const input = document.getElementById('msgInput');
            const val = input.value;
            let shift = parseInt(document.getElementById('shift').value) || 0;
            if(!val) return;

            if(mode === 'dec') shift = -shift;
            const result = val.split('').map(c => {
                const code = c.charCodeAt(0);
                return (code === 32 || code === 10) ? c : String.fromCharCode(code + shift);
            }).join('');

            const area = document.getElementById('resArea');
            const bar = document.getElementById('timer');
            document.getElementById('resText').innerText = result;
            document.getElementById('resLabel').innerText = mode === 'enc' ? "Encrypted Data" : "Decrypted Data";
            area.classList.remove('hidden');

            if(settings.ghost) input.value = ''; // Ghost Mode logic

            clearTimeout(countdown);
            bar.style.transition = 'none';
            bar.style.width = '100%';
            setTimeout(() => {
                bar.style.transition = 'width 30s linear';
                bar.style.width = '0%';
            }, 50);
            countdown = setTimeout(() => { area.classList.add('hidden'); }, 30000);
        }

        function copyIt() {
            navigator.clipboard.writeText(document.getElementById('resText').innerText);
            const b = event.target; b.innerText = "DONE!";
            setTimeout(() => b.innerText = "COPY", 2000);
        }

        // Privacy Shield: Blurs app when tab is inactive
        window.onblur = () => { document.body.classList.add('privacy-blur'); };
        window.onfocus = () => { document.body.classList.remove('privacy-blur'); };
    </script>
</body>
</html>
