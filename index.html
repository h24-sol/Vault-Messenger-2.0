<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault Messenger | Secure Multi-Language Privacy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top left, #0f172a, #020617);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #f8fafc;
        }
        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(34, 211, 238, 0.15);
        }
        .input-focus:focus {
            border-color: #22d3ee;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.2);
        }
        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.4);
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg glass rounded-[2.5rem] p-8 md:p-10 relative overflow-hidden shadow-2xl">
        
        <div class="flex flex-col items-center mb-10">
            <div class="w-16 h-16 bg-cyan-500/10 rounded-2xl flex items-center justify-center border border-cyan-500/30 mb-4 shadow-[0_0_15px_rgba(34,211,238,0.1)]">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight text-white uppercase">
                VAULT <span class="text-cyan-400">MESSENGER</span>
            </h1>
            <p class="text-[10px] tracking-[0.3em] font-bold text-slate-500 uppercase mt-2">Universal Language Encryption</p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
                <label class="text-[9px] font-bold text-cyan-500 uppercase block mb-1">Shift Value</label>
                <input type="number" id="shiftVal" value="10" class="bg-transparent text-xl font-bold text-white outline-none w-full">
            </div>
            <button onclick="toggleStealth()" id="stealthBtn" class="bg-slate-900/50 p-4 rounded-2xl border border-slate-800 text-left hover:border-cyan-500/50 transition-all group">
                <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1 group-hover:text-cyan-400">Stealth Mode</label>
                <span id="stealthStatus" class="text-xs font-bold text-slate-400">OFF</span>
            </button>
        </div>

        <textarea id="inputField" placeholder="আপনার গোপন বার্তাটি এখানে লিখুন... (Type here)" 
                  class="w-full bg-slate-900/80 border border-slate-800 rounded-3xl p-6 h-36 text-slate-200 outline-none input-focus transition-all text-lg resize-none mb-6"></textarea>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <button onclick="processData('enc')" class="btn-glow bg-cyan-600 hover:bg-cyan-500 text-slate-950 font-black py-5 rounded-2xl transition-all shadow-lg shadow-cyan-500/20">
                ENCRYPT
            </button>
            <button onclick="processData('dec')" class="bg-slate-800 hover:bg-slate-700 text-white font-black py-5 rounded-2xl border border-slate-700 transition-all">
                DECRYPT
            </button>
        </div>

        <div id="outputArea" class="hidden animate-in fade-in slide-in-from-bottom-2 duration-500">
            <div class="bg-cyan-500/5 border border-cyan-500/20 rounded-3xl p-6 relative">
                <div class="flex justify-between items-center mb-4">
                    <span id="outputLabel" class="text-[10px] font-bold text-cyan-400 uppercase tracking-widest">ENCRYPTED DATA</span>
                    <button onclick="copyToClipboard()" id="copyBtn" class="text-[10px] bg-cyan-500 text-slate-950 px-4 py-1.5 rounded-full font-black hover:bg-white transition-all uppercase">Copy</button>
                </div>
                <p id="outputText" class="text-xl font-medium text-white leading-relaxed break-words"></p>
                
                <div class="mt-6 h-1 w-full bg-slate-800 rounded-full overflow-hidden">
                    <div id="timerBar" class="h-full bg-cyan-400 w-full transition-all ease-linear"></div>
                </div>
                <p class="text-[9px] text-slate-500 mt-2 text-center uppercase tracking-widest">Self-Destruct in 30s</p>
            </div>
        </div>

        <footer class="mt-12 pt-8 border-t border-slate-800/50 text-center">
            <p class="text-[11px] text-slate-500 font-medium mb-1">Created by</p>
            <a href="mailto:manis.programmer@gmail.com" class="text-cyan-400 text-sm font-bold hover:text-white transition-colors">manis.programmer@gmail.com</a>
            <div class="flex justify-center gap-3 mt-6">
                <span class="text-[8px] px-2 py-1 bg-slate-900 border border-slate-800 rounded text-slate-400 font-bold uppercase">Solana Dev</span>
                <span class="text-[8px] px-2 py-1 bg-slate-900 border border-slate-800 rounded text-slate-400 font-bold uppercase">Web 4.0</span>
            </div>
        </footer>
    </div>

    <script>
        let isStealth = false;
        let timerId;

        function toggleStealth() {
            isStealth = !isStealth;
            const field = document.getElementById('inputField');
            const status = document.getElementById('stealthStatus');
            field.style.webkitTextSecurity = isStealth ? "disc" : "none";
            status.innerText = isStealth ? "ACTIVE" : "OFF";
            status.className = isStealth ? "text-xs font-bold text-cyan-400" : "text-xs font-bold text-slate-400";
        }

        // Universal Shift Logic for English, Bengali, and Symbols
        function processData(mode) {
            const str = document.getElementById('inputField').value;
            let shift = parseInt(document.getElementById('shiftVal').value) || 0;
            if(!str) return;

            if(mode === 'dec') shift = -shift;

            // Shift characters by Unicode point
            const result = str.split('').map(char => {
                const code = char.charCodeAt(0);
                // Keep spaces (32) and new lines (10) as they are for readability
                if (code === 32 || code === 10) return char;
                return String.fromCharCode(code + shift);
            }).join('');

            const area = document.getElementById('outputArea');
            const display = document.getElementById('outputText');
            const label = document.getElementById('outputLabel');
            const bar = document.getElementById('timerBar');

            display.innerText = result;
            label.innerText = mode === 'enc' ? "ENCRYPTED DATA" : "DECRYPTED DATA";
            area.classList.remove('hidden');

            // Reset Timer and Progress Bar
            clearTimeout(timerId);
            bar.style.transition = 'none';
            bar.style.width = '100%';
            
            setTimeout(() => {
                bar.style.transition = 'width 30s linear';
                bar.style.width = '0%';
            }, 50);

            timerId = setTimeout(() => {
                area.classList.add('hidden');
                display.innerText = "";
            }, 30000);
        }

        function copyToClipboard() {
            const text = document.getElementById('outputText').innerText;
            navigator.clipboard.writeText(text);
            const btn = document.getElementById('copyBtn');
            btn.innerText = "COPIED!";
            setTimeout(() => btn.innerText = "COPY", 2000);
        }
    </script>
</body>
</html>
